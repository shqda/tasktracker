name: tasktracker

services:
  postgres:
    image: postgres:17
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8080:8080"

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: >-
        host=postgres 
        port=5432                                                                                                                  
        user=${POSTGRES_USER}  
        password=${POSTGRES_PASSWORD}
        dbname=${POSTGRES_DB}        
        sslmode=disable
    volumes:
      - "./migrations:/migrations"
